<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anatomy of a Perfectly Optimised PDP: Google + LLM Signals | MagsTags</title>
<meta name="description" content="A visual breakdown of every element on a high-performing product page. What Google reads, what LLMs parse, where most PDPs fail, and how to fix it.">
<link rel="canonical" href="https://www.magstags.com/notes/anatomy-pdp-seo-llm/">
<meta property="og:title" content="Anatomy of a Perfectly Optimised PDP">
<meta property="og:description" content="What Google reads. What LLMs parse. Where most PDPs break.">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/base.css">
<style>
* { box-sizing: border-box; }

/* ── Hero ─────────────────────────────────────── */
.pdp-hero {
  max-width: 960px;
  margin: 0 auto;
  padding: 72px 48px 40px;
}
.pdp-hero-eyebrow {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 14px;
}
.pdp-hero h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: clamp(30px, 4.5vw, 44px);
  font-weight: 400;
  line-height: 1.15;
  letter-spacing: -.02em;
  margin-bottom: 18px;
}
.pdp-hero-sub {
  font-size: 16px;
  color: var(--text-2);
  line-height: 1.7;
  max-width: 580px;
  margin-bottom: 0;
}

/* ── Intro ────────────────────────────────────── */
.pdp-intro {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 48px 40px;
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-2);
  border-bottom: 1px solid var(--border);
}
.pdp-intro p { margin-bottom: 12px; }
.pdp-intro p:last-child { margin-bottom: 0; }

/* ── Hint ─────────────────────────────────────── */
.pdp-hint {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 48px 0;
  font-size: 12px;
  color: var(--teal);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
}

/* ── Mock PDP ─────────────────────────────────── */
.mock-wrap {
  max-width: 960px;
  margin: 16px auto 0;
  padding: 0 48px;
}

.browser-chrome {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 10px 10px 0 0;
  padding: 8px 12px;
}
.chrome-top { display: flex; align-items: center; gap: 8px; }
.chrome-dots { display: flex; gap: 4px; }
.chrome-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.chrome-url {
  flex: 1;
  background: var(--bg2, #f0eeec);
  border-radius: 4px;
  padding: 3px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mock-page {
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  background: var(--surface);
  overflow: hidden;
}

/* Clickable zones — teal hover */
[data-zone] {
  cursor: pointer;
  transition: background .15s, box-shadow .15s;
  position: relative;
}
[data-zone]:hover { background: rgba(26,182,219,.04); }
[data-zone].zone-active {
  background: rgba(26,182,219,.06);
  box-shadow: inset 3px 0 0 var(--teal);
}

/* Number badge on zones */
.zone-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--teal);
  color: #fff;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
  box-shadow: 0 2px 6px rgba(26,182,219,.35);
}
[data-zone]:hover .zone-badge,
[data-zone].zone-active .zone-badge { opacity: 1; }

/* Breadcrumb */
.mock-breadcrumb {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-3);
  background: var(--bg2, #f8f7f5);
}
.mock-breadcrumb a { color: var(--text-2); text-decoration: none; }

/* Grid */
.mock-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
@media (max-width: 600px) { .mock-grid { grid-template-columns: 1fr; } }

/* Image col */
.mock-img-col {
  padding: 16px;
  border-right: 1px solid var(--border);
  background: var(--bg2, #f8f7f5);
}
.mock-main-img {
  width: 100%;
  aspect-ratio: 4/5;
  background: var(--bg2, #f0eeec);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  margin-bottom: 8px;
}
.mock-thumbs { display: flex; gap: 5px; }
.mock-thumb {
  width: 36px;
  height: 36px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg2, #f0eeec);
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mock-thumb.on { border-color: var(--teal); }

/* Info col */
.mock-info-col { padding: 16px; }

.mock-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 6px;
}
.mock-rating {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 10px;
}
.mock-rating a { color: var(--text-2); text-decoration: underline; font-size: 10px; }
.mock-price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 4px;
}
.mock-price {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.mock-was { font-size: 12px; color: var(--text-3); text-decoration: line-through; }
.mock-sale {
  font-size: 9px;
  font-weight: 700;
  background: var(--bg2, #f0eeec);
  color: var(--text-2);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 3px;
}
.mock-stock { font-size: 11px; color: var(--text-2); margin-bottom: 10px; }
.mock-var { margin-bottom: 8px; }
.mock-var-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-3);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.mock-var-opts { display: flex; gap: 4px; flex-wrap: wrap; }
.mock-var-opt {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 10px;
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
}
.mock-var-opt.sel { border-color: var(--teal); color: var(--teal); font-weight: 600; background: rgba(26,182,219,.06); }
.mock-cta {
  background: var(--teal);
  color: #fff;
  padding: 8px 14px;
  border-radius: 5px;
  border: none;
  font-weight: 600;
  font-size: 11px;
  font-family: 'Space Grotesk', sans-serif;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
}

/* Below-fold sections */
.mock-section {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.mock-section-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
  margin-bottom: 8px;
}
.mock-desc-text {
  font-size: 10px;
  line-height: 1.65;
  color: var(--text-2);
}
.mock-spec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 20px;
}
.mock-spec-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
  color: var(--text-2);
}
.mock-spec-key { color: var(--text-3); }
.mock-rev-summary {
  display: flex;
  align-items: center;
  gap: 12px;
}
.mock-rev-big {
  font-size: 26px;
  font-weight: 700;
  font-family: 'Space Grotesk', sans-serif;
  color: var(--text);
  line-height: 1;
}
.mock-rev-bars { flex: 1; }
.mock-rev-bar-row {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  color: var(--text-3);
  margin-bottom: 2px;
}
.mock-rev-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.mock-rev-bar-fill {
  height: 100%;
  background: var(--text-2);
  border-radius: 2px;
}
.mock-related-grid { display: flex; gap: 6px; }
.mock-related-card {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 9px;
  color: var(--text-3);
  background: var(--bg2, #f8f7f5);
  text-align: center;
}
.mock-related-card .rc-emoji { font-size: 14px; display: block; margin-bottom: 2px; }
.mock-related-card .rc-name { color: var(--text-2); }
.mock-related-card .rc-price { color: var(--text); font-weight: 600; margin-top: 2px; display: block; }
.mock-code-row {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-3);
  line-height: 1.7;
}
.mock-code-row span { color: var(--teal); font-weight: 500; }

/* ── Divider ──────────────────────────────────── */
.anatomy-divider {
  max-width: 960px;
  margin: 56px auto 0;
  padding: 0 48px;
  border-top: 1px solid var(--border);
  padding-top: 56px;
}
.anatomy-divider-title {
  font-family: 'DM Serif Display', serif;
  font-size: 30px;
  font-weight: 400;
  margin-bottom: 10px;
}
.anatomy-divider-sub {
  font-size: 15px;
  color: var(--text-3);
  margin-bottom: 0;
}

/* ── Zone cards ───────────────────────────────── */
.zones-list {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 48px 80px;
}
.zone-card {
  padding: 32px 0;
  border-bottom: 1px solid var(--border);
  scroll-margin-top: 80px;
  transition: none;
}
.zone-card.card-highlight {
  background: none;
}
.zone-card-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 20px;
}
.zone-card-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: .05em;
  flex-shrink: 0;
  min-width: 24px;
}
.zone-card-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.2;
}
.zone-card-sub {
  font-size: 13px;
  color: var(--text-3);
  margin-top: 3px;
  font-family: 'Space Grotesk', sans-serif;
}

/* Three consistent sections per card */
.zone-block {
  margin-bottom: 16px;
}
.zone-block:last-of-type { margin-bottom: 0; }
.zone-block-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 6px;
}
.zone-block-body {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text-2);
}
.zone-block-body strong { color: var(--text); font-weight: 600; }
.zone-block-body p { margin-bottom: 8px; }
.zone-block-body p:last-child { margin-bottom: 0; }

/* Failure note */
.zone-fail {
  margin-top: 16px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--teal);
  border-radius: 0 8px 8px 0;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.65;
  background: rgba(26,182,219,.03);
}
.zone-fail-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 5px;
}

/* ── Footer ───────────────────────────────────── */
.post-footer {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 48px 64px;
}

/* mock-section-title teal */
.mock-section-title { color: var(--teal) !important; }

/* Zone body lists + code */
.zone-block-body ul { padding-left: 18px; margin: 6px 0 10px; }
.zone-block-body li { margin-bottom: 5px; }
.zone-block-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--bg2, #f0eeec);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text-2);
}
html.dark .zone-block-body code { background: rgba(255,255,255,.08); }

/* ── View switcher ────────────────────────────── */
.view-switcher {
  max-width: 960px;
  margin: 24px auto 0;
  padding: 0 48px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.view-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 99px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-3);
  cursor: pointer;
  transition: all .15s;
}
.view-btn:hover { border-color: var(--teal); color: var(--text-2); }
.view-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }
.view-btn svg { opacity: .7; }
.view-btn.active svg { opacity: 1; }

/* ── Code view ────────────────────────────────── */
.code-view {
  display: none;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  background: #16141200;
  overflow: hidden;
}
.code-view.visible { display: block; }
.mock-page.hidden { display: none; }

.code-block {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.code-block:last-child { border-bottom: none; }
.code-block:hover { background: rgba(26,182,219,.04); }
.code-block.zone-active {
  background: rgba(26,182,219,.06);
  box-shadow: inset 3px 0 0 var(--teal);
}
.code-block:hover .zone-badge,
.code-block.zone-active .zone-badge { opacity: 1; }

.code-block-label {
  padding: 8px 16px 4px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--teal);
}
pre.code-snippet {
  margin: 0;
  padding: 0 16px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  line-height: 1.7;
  color: var(--text-2);
  overflow-x: auto;
  white-space: pre;
  background: none;
}
pre.code-snippet .ck  { color: var(--text-3); }      /* key / tag */
pre.code-snippet .cv  { color: var(--teal); }        /* value */
pre.code-snippet .cs  { color: var(--text-3); }      /* comment */
pre.code-snippet .cx  { color: var(--text); font-weight: 500; } /* important */
html.dark pre.code-snippet { color: var(--text-2); }

@media (max-width: 768px) {
  .pdp-hero, .pdp-intro, .pdp-hint, .mock-wrap, .anatomy-divider, .zones-list, .post-footer {
    padding-left: 20px;
    padding-right: 20px;
  }
}

    /* Nested ToC styling */
    .ct-toc-list ol {
      border-left: 1px solid var(--border);
      margin-left: 14px;
      padding-left: 0;
    }
    .ct-toc-list ol li a {
      font-size: 12px;
      padding: 6px 0 6px 16px;
      color: var(--text-4);
    }
    .ct-toc-list ol li a:hover {
      color: var(--teal);
      border-left-color: var(--teal);
    }
    .ct-toc-list ol li a.active {
      color: var(--teal);
      font-weight: 600;
    }
    /* Third level (h4) */
    .ct-toc-list ol ol {
      margin-left: 12px;
    }
    .ct-toc-list ol ol li a {
      font-size: 11px;
      padding: 4px 0 4px 16px;
      color: var(--text-4);
    }
        @media(max-width:960px) {
      .ct-layout { grid-template-columns: 1fr; gap: 0; }
      .ct-toc { position: static; padding: 0; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 32px; order: -1; max-height: none; overflow-y: visible; overflow: hidden; }
      .ct-toc-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; background: var(--surface); border: none; padding: 14px 16px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-1); cursor: pointer; text-align: left; }
      .ct-toc-toggle .ct-toc-arrow { font-size: 11px; color: var(--text-4); transition: transform .2s; }
      .ct-toc-toggle.open .ct-toc-arrow { transform: rotate(180deg); }
      .ct-toc-label { display: none; }
      .ct-toc-list { border-left: none; flex-direction: column; flex-wrap: nowrap; gap: 0; border-top: 1px solid var(--border); display: none; padding: 8px 0; }
      .ct-toc-list.open { display: flex; }
      .ct-toc-list li a { border-left: none; padding: 8px 16px; font-size: 13px; }
    })();
</script>
</body>
</html>
