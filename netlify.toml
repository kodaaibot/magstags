[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# Redirect apex → www
[[redirects]]
  from   = "https://magstags.com/*"
  to     = "https://www.magstags.com/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirect old tool URL
[[redirects]]
  from   = "/gsc-regex-builder/*"
  to     = "/gsc-regex-generator/:splat"
  status = 301
  force  = true

# Redirect old hreflang URL (both /blog/ and /notes/ paths)
[[redirects]]
  from   = "/blog/hreflang-2025/"
  to     = "/notes/hreflang-mistakes/"
  status = 301
  force  = true

[[redirects]]
  from   = "/notes/hreflang-2025/"
  to     = "/notes/hreflang-mistakes/"
  status = 301
  force  = true

# Rename /blog/ to /notes/
[[redirects]]
  from   = "/blog/*"
  to     = "/notes/:splat"
  status = 301
  force  = true

